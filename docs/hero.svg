<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002444"/>
      <stop offset="50%" stop-color="#001a33"/>
      <stop offset="100%" stop-color="#061014"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a93800"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <radialGradient id="orbCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbOrange" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a93800" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a93800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="url(#orbCyan)"/>
  <ellipse cx="1000" cy="450" rx="350" ry="250" fill="url(#orbOrange)"/>
  <ellipse cx="600" cy="300" rx="500" ry="300" fill="url(#orbCyan)" opacity="0.3"/>

  <!-- DNA Helix (simplified) -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Left strand -->
    <path d="M 550 80 Q 450 200 550 320 Q 650 440 550 560" fill="none" stroke="#06B6D4" stroke-width="2.5"/>
    <!-- Right strand -->
    <path d="M 650 80 Q 750 200 650 320 Q 550 440 650 560" fill="none" stroke="#0891B2" stroke-width="2.5"/>
    <!-- Cross bars -->
    <line x1="520" y1="140" x2="680" y2="140" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <line x1="480" y1="230" x2="720" y2="230" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <line x1="520" y1="320" x2="680" y2="320" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <line x1="480" y1="410" x2="720" y2="410" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
    <line x1="520" y1="500" x2="680" y2="500" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Evolution nodes orbiting -->
  <g filter="url(#softGlow)">
    <circle cx="750" cy="200" r="6" fill="#a93800" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="320" r="5" fill="#06B6D4" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="380" r="5" fill="#a93800" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="180" r="4" fill="#fcf9f8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="480" r="4" fill="#06B6D4" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbit rings -->
  <ellipse cx="600" cy="320" rx="180" ry="180" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.15" stroke-dasharray="8 8"/>
  <ellipse cx="600" cy="320" rx="220" ry="140" fill="none" stroke="#a93800" stroke-width="0.5" opacity="0.1" stroke-dasharray="4 12" transform="rotate(-30 600 320)"/>

  <!-- Title -->
  <text x="200" y="240" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="#fcf9f8" filter="url(#glow)" letter-spacing="-1">
    Hermes
  </text>
  <text x="200" y="295" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="24" font-weight="400" fill="#06B6D4" letter-spacing="4" filter="url(#glow)">
    EVOLUTION DASHBOARD
  </text>

  <!-- Subtitle -->
  <text x="200" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
    Self-evolving intelligence. Autonomous skill lifecycle. Zero-friction.
  </text>

  <!-- Stats pills -->
  <g transform="translate(200, 370)">
    <rect x="0" y="0" width="130" height="44" rx="22" fill="rgba(6,182,212,0.08)" stroke="#06B6D4" stroke-width="0.8" opacity="0.8"/>
    <text x="65" y="18" font-family="'JetBrains Mono', monospace" font-size="10" fill="#67E8F9" text-anchor="middle">SKILLS</text>
    <text x="65" y="34" font-family="'JetBrains Mono', monospace" font-size="14" fill="#fcf9f8" text-anchor="middle" font-weight="600">229+</text>
  </g>
  <g transform="translate(345, 370)">
    <rect x="0" y="0" width="130" height="44" rx="22" fill="rgba(169,56,0,0.08)" stroke="#a93800" stroke-width="0.8" opacity="0.8"/>
    <text x="65" y="18" font-family="'JetBrains Mono', monospace" font-size="10" fill="#F97316" text-anchor="middle">EVOLVED</text>
    <text x="65" y="34" font-family="'JetBrains Mono', monospace" font-size="14" fill="#fcf9f8" text-anchor="middle" font-weight="600">4</text>
  </g>
  <g transform="translate(490, 370)">
    <rect x="0" y="0" width="130" height="44" rx="22" fill="rgba(6,182,212,0.05)" stroke="#0891B2" stroke-width="0.8" opacity="0.8"/>
    <text x="65" y="18" font-family="'JetBrains Mono', monospace" font-size="10" fill="#67E8F9" text-anchor="middle">PROVIDERS</text>
    <text x="65" y="34" font-family="'JetBrains Mono', monospace" font-size="14" fill="#fcf9f8" text-anchor="middle" font-weight="600">3</text>
  </g>

  <!-- Right side: architecture illustration -->
  <g transform="translate(860, 140)">
    <!-- Backend box -->
    <rect x="0" y="0" width="120" height="50" rx="8" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.2"/>
    <text x="60" y="30" font-family="system-ui, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">FastAPI</text>

    <!-- Database box -->
    <rect x="0" y="80" width="120" height="50" rx="8" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="60" y="110" font-family="system-ui, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Skills DB</text>

    <!-- Frontend box -->
    <rect x="0" y="160" width="120" height="50" rx="8" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="60" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">Next.js 16</text>

    <!-- Arrows -->
    <line x1="60" y1="50" x2="60" y2="80" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrowEm)"/>
    <line x1="60" y1="130" x2="60" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>

    <!-- Evolution label -->
    <text x="60" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">△ Evolution Loop</text>
    <path d="M 30 255 Q 60 275 90 255" fill="none" stroke="#a93800" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowEm" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="20" fill="rgba(6,182,212,0.05)"/>
  <text x="600" y="594" font-family="'JetBrains Mono', monospace" font-size="8" fill="#475569" text-anchor="middle">
    genoma://hermes-dashboard · #002444 / #a93800 / #fcf9f8 · v0.1.0
  </text>
</svg>
